<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Profile - G.R.I.D. Club</title>
    <link href="./src/style.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="bg-pattern min-h-screen flex flex-col pt-20">

    <!-- Authenticated Navigation -->
    <nav
        class="fixed top-0 w-full bg-grid-bg/90 backdrop-blur-md border-b border-gray-800 z-50 transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <div class="flex items-center gap-3">
                    <a href="dashboard.html" class="flex items-center gap-3">
                        <div
                            class="w-10 h-10 rounded-lg bg-gradient-to-br from-grid-blue to-grid-emerald flex items-center justify-center font-bold text-xl shadow-lg shadow-grid-blue/20">
                            G</div>
                        <span class="font-bold text-2xl tracking-tighter">G.R.I.D.</span>
                    </a>
                </div>

                <!-- Desktop Menu -->
                <div class="hidden md:flex items-center space-x-8">
                    <a href="materials.html" class="text-gray-300 hover:text-white transition-colors">Home</a>
                    <a href="activities.html" class="text-gray-300 hover:text-white transition-colors">Events</a>
                    <a href="dashboard.html" class="text-gray-300 hover:text-white transition-colors">Announcements</a>
                    <a href="team_directory.html" class="text-gray-300 hover:text-white transition-colors">Team</a>
                    <button id="logout-btn" class="btn-secondary ml-4 !px-4 !py-1.5 !text-sm">Logout</button>
                    <!-- User Profile Avatar Link -->
                    <a href="profile.html" class="group" title="User Profile">
                        <div class="w-10 h-10 rounded-full bg-grid-blue border-2 border-grid-blue flex items-center justify-center font-bold text-sm text-white shadow-[0_0_15px_rgba(0,255,198,0.3)] transition-all group-hover:scale-110"
                            id="user-avatar">
                            ?</div>
                    </a>
                </div>

                <!-- Mobile Menu Button -->
                <button class="md:hidden text-gray-300 hover:text-white" id="mobile-menu-btn" title="Menu">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
            </div>
        </div>
    </nav>

    <!-- Mobile Menu -->
    <div class="fixed inset-0 z-40 bg-grid-bg/95 backdrop-blur-xl hidden flex-col justify-center items-center space-y-8 transition-opacity duration-300"
        id="mobile-menu">
        <button class="absolute top-6 right-6 text-gray-400 hover:text-white" id="close-menu-btn" title="Close Menu">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
        </button>
        <div class="text-xl font-bold text-grid-blue mb-4 border-b border-gray-700 pb-2 flex flex-col items-center gap-2"
            id="mobile-user-name">
            <div class="w-16 h-16 rounded-full bg-gray-700 flex items-center justify-center text-white text-2xl font-bold"
                id="mobile-user-avatar">?</div>
            Welcome
        </div>
        <a href="profile.html" class="text-3xl font-medium text-grid-emerald hover:text-white transition-colors">My
            Profile</a>
        <a href="materials.html" class="text-3xl font-medium text-gray-300 hover:text-white transition-colors">Home</a>
        <a href="activities.html"
            class="text-3xl font-medium text-gray-300 hover:text-white transition-colors">Events</a>
        <a href="dashboard.html"
            class="text-3xl font-medium text-gray-300 hover:text-white transition-colors">Announcements</a>
        <a href="team_directory.html"
            class="text-3xl font-medium text-gray-300 hover:text-white transition-colors">Team</a>
        <button id="mobile-logout-btn"
            class="text-3xl font-medium text-red-500 hover:text-red-400 transition-colors mt-8">Logout</button>
    </div>

    <main class="flex-grow max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12 w-full space-y-8 relative overflow-hidden">
        <!-- Background gradients -->
        <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-grid-blue/20 rounded-full blur-[100px] -z-10"></div>
        <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-grid-emerald/20 rounded-full blur-[100px] -z-10"></div>

        <!-- Profile Header -->
        <div
            class="whiteboard-card flex flex-col md:flex-row items-center md:items-start gap-8 relative overflow-hidden">
            <div class="absolute left-0 top-0 bottom-0 w-2 bg-gradient-to-b from-grid-blue to-grid-emerald"></div>

            <!-- Large Avatar Placeholder -->
            <div class="w-32 h-32 rounded-full bg-gradient-to-br from-gray-700 to-gray-800 border-4 border-gray-600 shadow-xl flex items-center justify-center shadow-grid-emerald/20 ml-2"
                id="profile-large-avatar">
                <span class="text-5xl font-bold text-white uppercase" id="profile-initial">?</span>
            </div>

            <!-- User Identity Info -->
            <div class="text-center md:text-left flex-grow space-y-2 mt-2">
                <h1 class="text-3xl font-bold text-white tracking-tight" id="profile-name">Student Name</h1>
                <p class="text-grid-blue font-medium flex items-center justify-center md:justify-start gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                    </svg>
                    G.R.I.D. Club Member
                </p>
                <div class="mt-4 pt-4 border-t border-gray-700/50 flex flex-col gap-1 text-sm text-gray-400">
                    <p class="flex items-center justify-center md:justify-start gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
                            </path>
                        </svg>
                        <span id="profile-email">email@example.com</span>
                    </p>
                    <p class="flex items-center justify-center md:justify-start gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M10 6H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-5m-4 0V5a2 2 0 114 0v1m-4 0a2 2 0 104 0m-5 8a2 2 0 100-4 2 2 0 000 4zm0 0c1.306 0 2.417.835 2.83 2M9 14a3.001 3.001 0 00-2.83 2M15 11h3m-3 4h2">
                            </path>
                        </svg>
                        <span id="profile-branch">Not Specified</span>
                    </p>
                    <p class="flex items-center justify-center md:justify-start gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M7 20l4-16m2 16l4-16M6 9h14M4 15h14"></path>
                        </svg>
                        <span id="profile-roll">Not Specified</span>
                    </p>
                </div>
            </div>
        </div>

        <!-- Section: Registered Events -->
        <h2 class="text-2xl font-bold mt-12 mb-6 flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-grid-emerald/20 flex items-center justify-center">
                <svg class="w-5 h-5 text-grid-emerald" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z">
                    </path>
                </svg>
            </div>
            My Registrations
        </h2>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="profile-events-container">
            <!-- Dynamic events will be populated here -->
            <div class="col-span-full py-8 text-center bg-gray-800/20 rounded-xl border border-gray-700/50">
                <div
                    class="inline-flex w-8 h-8 rounded-full border-2 border-grid-blue border-t-transparent animate-spin mb-4">
                </div>
                <p class="text-gray-400">Loading your registrations...</p>
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="border-t border-gray-800 bg-grid-bg py-12 mt-auto">
        <div
            class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-2">
                <div
                    class="w-8 h-8 rounded-lg bg-gradient-to-br from-grid-blue to-grid-emerald flex items-center justify-center font-bold text-sm">
                    G</div>
                <span class="font-bold">G.R.I.D. Platform</span>
            </div>
            <p class="text-gray-500 text-sm">Raghu Engineering College &copy; 2026</p>
        </div>
    </footer>

    <script type="module" src="./src/js/auth.js"></script>
    <script type="module" src="./src/js/main.js"></script>
</body>

</html>
